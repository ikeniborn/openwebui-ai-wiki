generation:
  model: "<litellm-cloud-model-id>"          # e.g. an ollama *:cloud or anthropic model
  base_url: "http://host.docker.internal:4000/v1"
  api_key_env: OWAW_LLM_KEY                   # value injected from secrets, never committed
chunking:
  maxChars: 1200
  minChars: 200
  overlapChars: 200
  maxCount: 12
extraction:
  engine: docling
daemon:
  debounce_ms: 1500
openwebui:
  base_url: "http://minipc-traefik-openwebui:8080"   # internal, proxy-net; no public route
  collection: "ai-wiki"
  api_token_env: OWAW_OPENWEBUI_TOKEN                 # value injected from secrets, never committed
embedding:
  model: "bge-m3"                                     # OpenWebUI RAG engine must point at this (LiteLLM);
                                                      # bge-m3 is 1024-dim — changing it later forces a full re-index
sync:
  debounce_ms: 1500
agent:
  base_model: "<litellm-chat-model-id>"   # the LiteLLM chat model the Doc Agent wraps
  model_id: "ai-wiki-agent"               # OpenWebUI model id
  model_name: "Doc Agent"
  tool_id: "wiki_docs"
  tool_name: "Wiki Docs"
  doc_roots:                              # paths INSIDE the OpenWebUI container (mounted :ro)
    - /data/wiki
    - /data/sources
  max_read_bytes: 100000                  # read_doc truncation cap
  max_results: 20                         # search_docs result cap
  public: true                            # share the agent + tool with all users
